ch10:{icon:"🔀",title:"Étude de fonctions",desc:"Fonctions de référence, fonctions associées et variations.",
 sections:[
 {id:"c10s1",title:"Les fonctions de référence",desc:"x², x³, 1/x, √x : domaines, variations, courbes",
  course:[
   {h:"💡 L'idée",p:"Quatre courbes à connaître comme sa poche : la parabole (x²), la cubique (x³), l'hyperbole (1/x) et la demi-parabole couchée (√x). Toutes les fonctions du programme se construisent à partir d'elles."},
   {h:"📋 La carte d'identité de chaque fonction",method:[
    "x ↦ x² : définie sur ℝ, décroissante sur ]−∞ ; 0], croissante sur [0 ; +∞[. Courbe : parabole, minimum en 0.",
    "x ↦ x³ : définie sur ℝ, strictement croissante sur tout ℝ. Courbe symétrique par rapport à l'origine.",
    "x ↦ 1/x : définie sur ℝ* (jamais en 0 !), décroissante sur chaque intervalle. Courbe : hyperbole.",
    "x ↦ √x : définie sur [0 ; +∞[ seulement, strictement croissante.",
    "Positions relatives sur ]0 ; 1[ : x³ &lt; x² &lt; x. Sur ]1 ; +∞[ : x &lt; x² &lt; x³. Les courbes se croisent en 0 et en 1 !"],
   tip:"Pour retrouver une position relative, teste x = 1/2 : (1/2)³ = 1/8 &lt; (1/2)² = 1/4 &lt; 1/2. Un exemple bien choisi permet de vérifier en 10 secondes."}],
  demo:{lines:["x² : ↘ sur ]−∞;0] puis ↗ sur [0;+∞[","x³ : ↗ sur ℝ tout entier","1/x : définie sur ℝ*, hyperbole ↘","√x : définie sur [0;+∞[, ↗","sur ]0;1[ : x³ &lt; x² &lt; x","test x = 1/2 : 1/8 &lt; 1/4 &lt; 1/2 ✓"],
  steps:[
   {show:[0],n:"La fonction carré : elle descend jusqu'en zéro, puis remonte. Sa courbe est la parabole, avec un minimum en zéro."},
   {show:[1],n:"La fonction cube : strictement croissante sur R tout entier, sans jamais redescendre. Sa courbe est symétrique par rapport à l'origine."},
   {show:[2],n:"La fonction inverse : attention, elle n'est pas définie en zéro ! Elle décroît sur chaque moitié de son domaine. Sa courbe est l'hyperbole."},
   {show:[3],n:"La fonction racine carrée : définie seulement pour les nombres positifs ou nuls, strictement croissante."},
   {show:[4,5],glow:[4],n:"Entre 0 et 1, surprise : le cube est plus petit que le carré, lui-même plus petit que x. Vérifie avec un demi : un huitième, plus petit qu'un quart, plus petit qu'un demi !"}]},
  ex:[
   {type:"mcq",q:"L'ensemble de définition de x ↦ √x est…",c:["[0 ; +∞[","ℝ","ℝ*","]0 ; 1["],a:0,explain:"On ne prend la racine carrée que d'un nombre positif ou nul."},
   {type:"mcq",q:"L'ensemble de définition de x ↦ 1/x est…",c:["ℝ privé de 0","ℝ","[0 ; +∞[","ℝ privé de 1"],a:0,explain:"Division par zéro interdite : ℝ* = ℝ privé de 0."},
   {type:"mcq",q:"La fonction carré est décroissante sur…",c:["]−∞ ; 0]","[0 ; +∞[","ℝ","]0 ; 1["],a:0,explain:"Elle descend jusqu'à son minimum en 0, puis remonte."},
   {type:"mcq",q:"Sur ]0 ; 1[, le bon classement est…",c:["x³ &lt; x² &lt; x","x &lt; x² &lt; x³","x² &lt; x³ &lt; x","x³ = x² = x"],a:0,explain:"Élever un nombre entre 0 et 1 à une puissance le rend plus petit. Teste x = 1/2 !"},
   {type:"mcq",q:"La courbe de la fonction inverse s'appelle…",c:["une hyperbole","une parabole","une sinusoïde","une droite"],a:0,explain:"Deux branches symétriques par rapport à l'origine : l'hyperbole."},
   {type:"num",q:"Calcule (−2)³ = ?",a:"-8",explain:"(−2)³ = −2 × −2 × −2 = −8 : le cube conserve le signe."}]},
 {id:"c10s2",title:"Les fonctions associées",desc:"Variations de u + k, λu, √u et 1/u",
  course:[
   {h:"💡 L'idée",p:"À partir d'une fonction u dont on connaît les variations, on peut déduire SANS CALCUL les variations de u + k, λu, √u et 1/u. C'est un jeu de transformations : certaines conservent le sens de variation, d'autres l'inversent."},
   {h:"📋 Les règles de transformation",method:[
    "u + k (ajouter une constante) : MÊMES variations que u. La courbe glisse verticalement, sa forme ne change pas.",
    "λu avec λ &gt; 0 : mêmes variations. λu avec λ &lt; 0 : variations INVERSÉES (la courbe se retourne).",
    "√u : mêmes variations que u, sur les intervalles où u ≥ 0.",
    "1/u : variations INVERSÉES de u, sur les intervalles où u garde un signe constant.",
    "Stratégie d'exercice : je pars des variations de u, j'applique la règle, je conclus. Zéro calcul de dérivée !"],
   tip:"Logique de l'inverse : quand u grandit, 1/u rapetisse (plus le gâteau est partagé, plus les parts sont petites). D'où l'inversion des variations."}],
  demo:{lines:["u croissante sur I. Alors :","u + 5 : croissante (translation)","−2u : décroissante (λ &lt; 0 inverse)","√u : croissante (là où u ≥ 0)","1/u : décroissante (u de signe constant)","+k et λ&gt;0 conservent ; λ&lt;0 et 1/u inversent"],
  steps:[
   {show:[0],n:"Point de départ : une fonction u croissante sur un intervalle. Déduisons les variations de ses fonctions associées, sans aucun calcul."},
   {show:[1],n:"u plus 5 : j'ajoute une constante. La courbe monte de 5 unités, mais sa forme ne change pas : toujours croissante."},
   {show:[2],n:"Moins 2 u : je multiplie par un nombre négatif. La courbe se retourne : les variations s'inversent. Décroissante !"},
   {show:[3],n:"Racine de u : la racine carrée est croissante, elle respecte l'ordre. Mêmes variations que u, là où u est positive."},
   {show:[4,5],glow:[5],n:"Un sur u : l'inverse retourne l'ordre. Quand u grandit, un sur u rapetisse : variations inversées. Bilan : ajouter une constante et multiplier par un positif conservent ; multiplier par un négatif et inverser retournent."}]},
  ex:[
   {type:"mcq",q:"u est croissante sur I. Alors u + 5 est…",c:["croissante sur I","décroissante sur I","constante","impossible à savoir"],a:0,explain:"Ajouter une constante ne change pas les variations."},
   {type:"mcq",q:"u est croissante sur I. Alors −2u est…",c:["décroissante sur I","croissante sur I","constante","positive"],a:0,explain:"λ = −2 &lt; 0 : les variations s'inversent."},
   {type:"mcq",q:"√u a les mêmes variations que u…",c:["sur les intervalles où u ≥ 0","partout","nulle part","seulement si u est croissante"],a:0,explain:"√u n'existe que si u ≥ 0, et la racine carrée conserve l'ordre."},
   {type:"mcq",q:"u est décroissante et strictement positive sur I. Alors 1/u est…",c:["croissante sur I","décroissante sur I","nulle","négative"],a:0,explain:"L'inverse retourne les variations : u ↘ donne 1/u ↗."},
   {type:"num",q:"u(x) = x² + 1 a pour minimum 1. Le maximum de 1/u vaut… ?",a:"1",explain:"1/u est maximal quand u est minimal : 1/1 = 1."},
   {type:"mcq",q:"Quelle transformation inverse les variations ?",c:["multiplier par −3","ajouter 100","prendre la racine √u","multiplier par 2"],a:0,explain:"Seuls λ &lt; 0 et le passage à l'inverse retournent les variations."}]}
]},

ex1:{icon:"📝",title:"Évaluation n°1",desc:"Format évaluation commune · Second degré, suites, dérivation, trigo, probabilités.",
 sections:[

   {type:"mcq",q:"[Second degré] La forme canonique de f(x) = x² − 6x + 5 est…",c:["(x − 3)² − 4","(x − 6)² + 5","(x + 3)² − 4","(x − 3)² + 4"],a:0,explain:"α = 6/2 = 3, β = f(3) = 9 − 18 + 5 = −4."},

  const saved = localStorage.getItem("mathquest_premiere");

}catch(e){}

let soundOn = true;
try{ const s = localStorage.getItem("mathquest_sound"); if(s!==null) soundOn = s==="1"; }catch(e){}
function toggleSound(){
  soundOn = !soundOn;
  if(!soundOn){ stopNarration(); stopDemo(); }
  document.getElementById("soundbtn").textContent = soundOn ? "🔊":"🔇";
  try{ localStorage.setItem("mathquest_sound", soundOn?"1":"0"); }catch(e){}
}
let actx = null;
function ac(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function tone(freq,t0,dur,type,vol){
  const a=ac(),o=a.createOscillator(),g=a.createGain();
  o.type=type||"sine"; o.frequency.value=freq;
  g.gain.setValueAtTime(vol||.2, a.currentTime+t0);
  g.gain.exponentialRampToValueAtTime(.001, a.currentTime+t0+dur);
  o.connect(g); g.connect(a.destination);
  o.start(a.currentTime+t0); o.stop(a.currentTime+t0+dur);
}
function sCorrect(){ if(!soundOn) return; try{ tone(523.25,0,.15); tone(659.25,.12,.15); tone(783.99,.24,.3); }catch(e){} }
function sWrong(){ if(!soundOn) return; try{ tone(196,0,.25,"sawtooth",.12); tone(165,.2,.35,"sawtooth",.12); }catch(e){} }
function sFanfare(){ if(!soundOn) return; try{ [523.25,659.25,783.99,1046.5].forEach((f,i)=>tone(f,i*.13,.35)); }catch(e){} }

/* ================================================================
   VOIX — synthèse vocale + correction de prononciation
================================================================ */
let voices = [];
function loadVoices(){ if(window.speechSynthesis) voices = speechSynthesis.getVoices(); }
loadVoices();
if(window.speechSynthesis) speechSynthesis.onvoiceschanged = loadVoices;
const VOICE_PREF = ["Thomas","Audrey","Amélie","Amelie","Aurélie","Marie","Daniel (French"];
function pickVoice(){
  const fr = voices.filter(v=>v.lang.toLowerCase().startsWith("fr"));
  for(const name of VOICE_PREF){
    const v = fr.find(v=>v.name.includes(name));
    if(v) return v;
  }
  return fr[0];
}
/* Corrige la prononciation des maths : « 5 plus 3 » doit se dire « plusse » */
function speakable(t){
  return t
    .replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE0F}]/gu,"")
    .replace(/plus ou moins/gi,"plusse ou moins")
    .replace(/(\d|\bx\b|\bn\b|carré|cube|delta|alpha|beta|pi)\s+plus\s+/gi,"$1 plusse ")
    .replace(/\bplus\s+(\d|x\b|n\b|b\b|c\b|r\b|q\b|un\b|deux|trois|quatre|cinq|six|sept|huit|neuf|dix|beta|racine|la racine|l'infini)/gi,"plusse $1")
    .replace(/\+∞/g," l'infini positif ")
    .replace(/−∞/g," moins l'infini ")
    .replace(/\+/g," plusse ")
    .replace(/√/g," racine de ")
    .replace(/Δ/g," delta ")
    .replace(/×/g," fois ")
    .replace(/−/g," moins ")
    .replace(/≤/g," inférieur ou égal à ")
    .replace(/≥/g," supérieur ou égal à ")
    .replace(/≠/g," différent de ")
    .replace(/π/g," pi ")
    .replace(/²/g," au carré ")
    .replace(/³/g," au cube ")
    .replace(/ⁿ/g," puissance n ")
    .replace(/uₙ₊₁/g,"u indice n plusse 1")
    .replace(/uₙ/g,"u indice n")
    .replace(/vₙ₊₁/g,"v indice n plusse 1")
    .replace(/vₙ/g,"v indice n")
    .replace(/u₀/g,"u zéro").replace(/v₀/g,"v zéro")
    .replace(/x₁/g,"x un").replace(/x₂/g,"x deux").replace(/x₀/g,"x zéro")
    .replace(/f'/g,"f prime")
    .replace(/∈/g," appartient à ")
    .replace(/⟺/g," équivaut à ")
    .replace(/ℝ/g," R ")
    .replace(/\b[xX]\b/g," ixe ")
    .trim();
}
function speak(text, onend){
  let ended = false;
  const done = ()=>{ if(!ended){ ended=true; onend(); } };
  if(!soundOn || !window.speechSynthesis){ setTimeout(done, 2600); return; }
  const clean = speakable(text);
  const u = new SpeechSynthesisUtterance(clean);
  const v = pickVoice(); if(v) u.voice = v;
  u.lang = "fr-FR"; u.rate = 1;
  u.onend = done; u.onerror = done;
  try{ speechSynthesis.resume(); speechSynthesis.speak(u); }catch(e){ setTimeout(done, 2600); return; }
  const est = Math.max(3500, clean.split(/\s+/).length * 480) + 2000;
  setTimeout(done, est);
}
function stopSpeech(){ if(window.speechSynthesis) speechSynthesis.cancel(); }

   NAVIGATION
================================================================ */
let curCh = null, curSec = null, cur = null;
function chapterSections(chId){ return CHAPTERS[chId].sections }
function findSection(secId){
  for(const chId in CHAPTERS){
    const s = CHAPTERS[chId].sections.find(s=>s.id===secId);
    if(s) return {ch:chId, sec:s};
  }
  return null;
}
function isSecUnlocked(chId, idx){
  if(idx===0) return true;
  return !!state.done[CHAPTERS[chId].sections[idx-1].id];
}
function goHome(){
  stopNarration(); stopDemo();
  ["view-chapter","view-section"].forEach(v=>document.getElementById(v).classList.add("hidden"));
  document.getElementById("view-home").classList.remove("hidden");
  renderHome();
}
function openChapter(chId){
  stopNarration(); stopDemo();
  curCh = chId;
  document.getElementById("view-home").classList.add("hidden");
  document.getElementById("view-section").classList.add("hidden");
  document.getElementById("view-chapter").classList.remove("hidden");
  renderChapter();
}
function openSection(secId){
  stopNarration(); stopDemo();
  const f = findSection(secId);
  curCh = f.ch; curSec = f.sec;
  cur = {qi:0, score:0, answered:false, selected:null, results:[]};
  document.getElementById("view-home").classList.add("hidden");
  document.getElementById("view-chapter").classList.add("hidden");
  document.getElementById("view-section").classList.remove("hidden");
  document.getElementById("section-title").textContent = CHAPTERS[curCh].icon+" "+curSec.title;
  document.getElementById("sec-back").onclick = ()=>openChapter(curCh);
  ["tab-course","tab-ex","tab-res"].forEach(id=>document.getElementById(id).classList.remove("done"));
  showPhase("course");
  renderCourse();
}
function showPhase(p){
  ["course","ex","res"].forEach(x=>{
    document.getElementById("phase-"+x).classList.toggle("hidden", x!==p);
    document.getElementById("tab-"+x).classList.toggle("active", x===p);
  });
  window.scrollTo({top:0});
}

/* ================================================================
   RENDU ACCUEIL & CHAPITRE
================================================================ */
function renderHome(){
  updateHUD();
  const el = document.getElementById("domains");
  el.innerHTML = "";
  DOMAINS.forEach(d=>{
    const wd = document.createElement("div"); wd.className="world";
    wd.innerHTML = `<div class="world-head"><div class="icon">${d.icon}</div><div><h2>${d.name}</h2></div></div>`;
    const grid = document.createElement("div"); grid.className="missions";
    d.chapters.forEach(chId=>{
      const ch = CHAPTERS[chId];
      const total = ch.sections.length;
      const done = ch.sections.filter(s=>state.done[s.id]).length;
      const card = document.createElement("div");
      card.className = "mission";
      card.innerHTML = `
        ${done===total ? '<div class="donebadge">✓ Terminé</div>':''}
        <div class="m-icon">${ch.icon}</div><h3>${ch.title}</h3><p>${ch.desc}</p>
        <div class="chprog"><div class="bar"><div class="fill" style="width:${done/total*100}%"></div></div>
        <div class="lbl">${done}/${total}</div></div>`;
      card.onclick = ()=>openChapter(chId);
      grid.appendChild(card);
    });
    wd.appendChild(grid); el.appendChild(wd);
  });
  renderBadges();
}
function renderChapter(){
  const ch = CHAPTERS[curCh];
  document.getElementById("chapter-title").textContent = ch.icon+" "+ch.title;
  const el = document.getElementById("seclist");
  el.innerHTML = "";
  ch.sections.forEach((s,i)=>{
    const unlocked = isSecUnlocked(curCh,i);
    const d = state.done[s.id];
    const row = document.createElement("div");
    row.className = "secrow"+(unlocked?"":" locked");
    row.innerHTML = `
      <div class="secnum">${unlocked ? (i+1) : "🔒"}</div>
      <div class="body"><h3>${s.title}</h3><p>${s.desc}</p></div>
      <div class="stars">${d ? "★".repeat(d.stars)+"☆".repeat(3-d.stars) : "☆☆☆"}</div>`;
    row.onclick = ()=>{ if(unlocked) openSection(s.id); else alert("Termine d'abord la section précédente !"); };
    el.appendChild(row);
  });
}
function renderBadges(){
  const all = Object.values(CHAPTERS).flatMap(c=>c.sections);
  const nDone = all.filter(s=>state.done[s.id]).length;
  const chDone = Object.values(CHAPTERS).filter(c=>c.sections.every(s=>state.done[s.id])).length;
  const defs = [
    {icon:"🥇",label:"Première section", on:nDone>=1},
    {icon:"🔥",label:"5 sections réussies", on:nDone>=5},
    {icon:"📗",label:"Une leçon terminée", on:chDone>=1},
    {icon:"👑",label:"Tout le programme", on:nDone>=all.length},
    {icon:"💎",label:"Un sans-faute", on:state.perfect},
    {icon:"⚡",label:"1000 XP", on:state.xp>=1000},
  ];
  document.getElementById("badges").innerHTML = defs.map(b=>
    `<div class="badge${b.on?"":" off"}">${b.icon} ${b.label}</div>`).join("");
}

function demoSvg(d){ return d.lines ? linesSvg(d.lines) : d.svg }
function demoId(x){ return typeof x==="number" ? "dl"+x : x }
function renderCourse(){
  const s = curSec;
  const demo = s.demo ? `
    <div class="course-card">
      <h3>🎬 Démonstration animée</h3>
      <div class="schema" id="animbox">${demoSvg(s.demo)}</div>
      <button class="bigbtn" id="demobtn" onclick="playDemo()">▶️ Lancer la démonstration</button>
    </div>` : "";
  document.getElementById("phase-course").innerHTML =
    `<div class="narrbar"><button class="narrbtn" id="narrbtn" onclick="toggleNarration()">▶️ Écouter la leçon</button></div>` +
    s.course.map((c,ci)=>`
    <div class="course-card" id="cc${ci}">
      <h3>${c.h}</h3>
      ${c.p?`<p>${c.p}</p>`:""}
      ${c.method?`<div class="method">${c.method.map((st,i)=>`
        <div class="step" id="cc${ci}s${i}"><div class="stepnum">${i+1}</div><p>${st}</p></div>`).join("")}</div>`:""}
      ${c.tip?`<div class="tipbox" id="cc${ci}t">💡 ${c.tip}</div>`:""}
    </div>`).join("") + demo +
    `<button class="bigbtn" onclick="startExercises()">C'est parti, aux exercices ! →</button>`;
}

let narrPlaying=false, narrSeq=[], narrIdx=0;
function clearHighlights(){ document.querySelectorAll(".speaking").forEach(e=>e.classList.remove("speaking")); }
function updateNarrBtn(){
  const b=document.getElementById("narrbtn"); if(!b) return;
  b.textContent = narrPlaying ? "⏹ Arrêter la lecture" : "▶️ Écouter la leçon";
  b.classList.toggle("on", narrPlaying);
}
function toggleNarration(){
  if(narrPlaying){ stopNarration(); return; }
  stopDemo();
  narrSeq = [];
  curSec.course.forEach((c,i)=>{
    if(c.p) narrSeq.push({el:"cc"+i, text:c.p});
    if(c.method) c.method.forEach((st,j)=>narrSeq.push({el:"cc"+i+"s"+j, text:st}));
    if(c.tip) narrSeq.push({el:"cc"+i+"t", text:c.tip});
  });
  narrIdx = 0; narrPlaying = true;
  updateNarrBtn(); narrNext();
}
function narrNext(){
  clearHighlights();
  if(!narrPlaying || narrIdx>=narrSeq.length){ stopNarration(); return; }
  const s = narrSeq[narrIdx];
  const el = document.getElementById(s.el);
  if(el){ el.classList.add("speaking"); el.scrollIntoView({behavior:"smooth",block:"center"}); }
  speak(s.text, ()=>{ narrIdx++; narrNext(); });
}
function stopNarration(){ narrPlaying=false; stopSpeech(); clearHighlights(); updateNarrBtn(); }

let demoPlaying=false;
function resetDemo(){ document.querySelectorAll("#animbox .anim-el").forEach(e=>e.classList.remove("show","glow")); }
function playDemo(){
  if(demoPlaying){ stopDemo(); return; }
  stopNarration();
  demoPlaying = true;
  const b=document.getElementById("demobtn"); if(b) b.textContent = "⏹ Arrêter la démonstration";
  resetDemo(); demoStep(0);
}
function demoStep(i){
  if(!demoPlaying) return;
  const steps = curSec.demo.steps;
  if(i>=steps.length){ sCorrect(); stopDemo(); return; }
  const s = steps[i];
  (s.hide||[]).forEach(id=>{ const e=document.getElementById(demoId(id)); if(e) e.classList.remove("show"); });
  (s.show||[]).forEach(id=>{ const e=document.getElementById(demoId(id)); if(e) e.classList.add("show"); });
  (s.glow||[]).forEach(id=>{ const e=document.getElementById(demoId(id)); if(e) e.classList.add("glow"); });
  speak(s.n, ()=>demoStep(i+1));
}
function stopDemo(){
  demoPlaying = false; stopSpeech();
  const b=document.getElementById("demobtn"); if(b) b.textContent = "▶️ Lancer la démonstration";
}

/* ================================================================
   EXERCICES
================================================================ */
function startExercises(){
  stopNarration(); stopDemo();
  cur.qi = 0; cur.score = 0; cur.results = [];
  showPhase("ex");
  renderQuestion();
}
function renderQuestion(){
  const q = curSec.ex[cur.qi];
  cur.answered = false; cur.selected = null;
  const dots = curSec.ex.map((_,i)=>{
    let c = "ex-dot";
    if(i<cur.qi) c += cur.results[i] ? " ok":" ko";
    else if(i===cur.qi) c += " cur";
    return `<div class="${c}"></div>`;
  }).join("");
  let body;
  if(q.type==="mcq"){
    body = `<div class="choices">${q.c.map((c,i)=>
      `<button class="choice" id="ch${i}" onclick="selectChoice(${i})">${c}</button>`).join("")}</div>`;
  } else {
    body = `<input class="numinput" id="numans" inputmode="text" placeholder="Ta réponse…" onkeydown="if(event.key==='Enter')checkAnswer()">`;
  }
  document.getElementById("phase-ex").innerHTML = `
    <div class="ex-progress">${dots}</div>
    <div class="question">
      <div class="qtxt">${q.q}</div>
      ${body}
      <div class="feedback" id="fb"></div>
      <button class="bigbtn" id="actionbtn" onclick="checkAnswer()">Valider</button>
    </div>`;
  const inp = document.getElementById("numans"); if(inp) inp.focus();
}
function selectChoice(i){
  if(cur.answered) return;
  cur.selected = i;
  document.querySelectorAll(".choice").forEach((b,j)=>b.classList.toggle("sel", j===i));
}
function checkAnswer(){
  if(cur.answered){ nextQuestion(); return; }
  const q = curSec.ex[cur.qi];
  let ok;
  if(q.type==="mcq"){
    if(cur.selected===null) return;
    ok = cur.selected===q.a;
    document.getElementById("ch"+q.a).classList.add("correct");
    if(!ok) document.getElementById("ch"+cur.selected).classList.add("wrong");
  } else {
    const v = (document.getElementById("numans").value||"").trim().replace(",",".").replace(/\s/g,"");
    if(v==="") return;
    ok = v===String(q.a) || (parseFloat(v)===parseFloat(q.a) && !isNaN(parseFloat(v)));
    document.getElementById("numans").style.borderColor = ok ? "var(--green)":"var(--red)";
  }
  cur.answered = true;
  cur.results.push(ok);
  if(ok) sCorrect(); else sWrong();
  if(ok){ cur.score++; state.xp += XP_PER_Q; save(); updateHUD(); }
  const fb = document.getElementById("fb");
  fb.className = "feedback "+(ok?"good":"bad");
  fb.innerHTML = `<strong>${ok?"✅ Bravo !":"❌ Pas tout à fait."}</strong> ${!ok ? "La bonne réponse était : <strong>"+(q.type==="mcq"?q.c[q.a]:q.a)+"</strong>. " : ""}<br>${q.explain}`;
  document.getElementById("actionbtn").textContent = (cur.qi < curSec.ex.length-1) ? "Question suivante →" : "Voir mon résultat 🏆";
}
function nextQuestion(){
  if(cur.qi < curSec.ex.length-1){ cur.qi++; renderQuestion(); }
  else showResults();
}
function showResults(){
  const n = curSec.ex.length, s = cur.score;
  const stars = s===n ? 3 : (s>=Math.ceil(n*0.6) ? 2 : (s>0 ? 1 : 0));
  const prev = state.done[curSec.id];
  if(!prev || stars > prev.stars) state.done[curSec.id] = {stars};
  if(s===n) state.perfect = true;
  save(); updateHUD(); sFanfare();
  const secs = CHAPTERS[curCh].sections;
  const idx = secs.findIndex(x=>x.id===curSec.id);
  const next = secs[idx+1];
  const titles = ["Section terminée !","Excellent travail !","Score parfait !"];
  document.getElementById("phase-res").innerHTML = `
    <div class="result">
      <div style="font-size:52px">${stars===3?"🏆":stars===2?"🎉":"💪"}</div>
      <div class="bigstars">${"★".repeat(stars)}${"☆".repeat(3-stars)}</div>
      <h2>${titles[stars===3?2:(stars===2?1:0)]}</h2>
      <p>${s} / ${n} bonnes réponses</p>
      <div class="xpgain">+${s*XP_PER_Q} XP ⚡</div>
      <div style="display:grid;gap:10px;max-width:340px;margin:0 auto">
        ${next?`<button class="bigbtn" onclick="openSection('${next.id}')">Section suivante →</button>`:""}
        <button class="backbtn" onclick="startExercises()">Refaire les exercices</button>
        <button class="backbtn" onclick="openChapter('${curCh}')">Retour à la leçon</button>
      </div>
    </div>`;
  showPhase("res");
  document.getElementById("tab-course").classList.add("done");
  document.getElementById("tab-ex").classList.add("done");
}

/* INIT */
document.getElementById("soundbtn").textContent = soundOn ? "🔊":"🔇";
renderHome();
</script>
</body>
</html>
